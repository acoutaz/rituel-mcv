<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Évaluations — Suivi des ventes Terminale</title>
</head>
<body style="margin:0;">
<div id="app"></div>
<style>
  :root{
    --ink:#2B2118; --paper:#F6EFE4; --paper-line:#E3D8C4;
    --wine:#7A2E3B; --slate:#3F5461; --sagegreen:#5C6E4F; --gold:#B8863B;
    --font-display:'Playfair Display', Georgia, serif;
    --font-body:'Public Sans', Arial, sans-serif;
    --font-mono:'Roboto Mono', 'Courier New', monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Public+Sans:wght@400;500;600&family=Roboto+Mono:wght@400;600&display=swap');
  *{box-sizing:border-box;}
  #app{font-family:var(--font-body); color:var(--ink); background:var(--paper); min-height:100vh;}
  .wrap{max-width:720px;margin:0 auto;padding:28px 20px 60px;}
  h1,h2,h3{font-family:var(--font-display); margin:0 0 6px; font-weight:700;}
  .eyebrow{font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--wine); margin-bottom:6px;}
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:12px; flex-wrap:wrap;}
  .toggle{display:flex; border:1.5px solid var(--ink); overflow:hidden; font-family:var(--font-mono); font-size:12px;}
  .toggle button{background:none; border:none; padding:7px 14px; cursor:pointer; color:var(--ink); font-family:inherit;}
  .toggle button.active{background:var(--ink); color:var(--paper);}
  .card{background:#fff; border:1px solid var(--paper-line); border-left:5px solid var(--wine); padding:22px; margin-bottom:16px;}
  .context-card{background:#fff; border:1px solid var(--paper-line); border-left:5px solid var(--slate); padding:22px; margin-bottom:20px;}
  .qcard{background:#fff; border:1px solid var(--paper-line); padding:20px; margin-bottom:14px;}
  .qcard.open{border-left:4px solid var(--sagegreen);}
  .qcard.qcm{border-left:4px solid var(--slate);}
  .qcard.num{border-left:4px solid var(--gold);}
  .tag{display:inline-block; font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; padding:4px 10px; color:#fff; margin-bottom:10px; margin-right:6px;}
  .tag.outline{background:none;border:1px solid currentColor;}
  .qtext{font-size:16px; line-height:1.6; margin:6px 0 14px;}
  .qtext b{font-family:var(--font-mono);}
  input[type=text],input[type=number],select,textarea{width:100%; font-family:var(--font-body); font-size:15px; padding:10px 12px; border:1px solid var(--ink); background:var(--paper); color:var(--ink);}
  textarea{font-family:var(--font-body); resize:vertical;}
  .choices{display:flex; flex-direction:column; gap:8px; margin-top:4px;}
  .choice{border:1px solid var(--ink); padding:10px 14px; cursor:pointer; font-size:15px; background:#fff;}
  .choice:hover{background:var(--paper);}
  .choice.selected{background:var(--ink); color:#fff;}
  .btn{font-family:var(--font-mono); font-size:13px; letter-spacing:.05em; text-transform:uppercase; background:var(--wine); color:#fff; border:none; padding:13px 24px; cursor:pointer; margin-top:16px;}
  .btn:hover{opacity:.88;}
  .btn.secondary{background:none; color:var(--ink); border:1px solid var(--ink);}
  .feedback{margin-top:10px; padding:12px; font-size:13px; font-family:var(--font-mono);}
  .feedback.good{background:rgba(92,110,79,.12); color:var(--sagegreen); border:1px solid var(--sagegreen);}
  .feedback.bad{background:rgba(122,46,59,.12); color:var(--wine); border:1px solid var(--wine);}
  .feedback.pending{background:rgba(184,134,59,.12); color:var(--gold); border:1px solid var(--gold);}
  table{width:100%; border-collapse:collapse; font-size:13px; margin-top:8px;}
  th,td{padding:8px 10px; border-bottom:1px solid var(--paper-line); text-align:left; vertical-align:middle;}
  th{font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--slate);}
  .lvl{display:inline-block; padding:3px 9px; font-family:var(--font-mono); font-size:11px; color:#fff; white-space:nowrap;}
  .muted{color:#7a6f5f; font-size:13px;}
  .domgroup{margin-bottom:16px;}
  .domgroup-title{font-family:var(--font-mono); font-size:12px; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px;}
  .themepick{display:flex; flex-wrap:wrap; gap:8px;}
  .themebtn{border:1px solid var(--ink); padding:8px 14px; cursor:pointer; background:#fff; font-size:13px;}
  .themebtn.active{color:#fff;}
  #qr-box{background:#fff; padding:12px; display:inline-block; border:1px solid var(--ink); margin-top:12px;}
  #qr-box-train{background:#fff; padding:12px; display:inline-block; border:1px solid var(--ink); margin-top:12px;}
  .qnum{font-family:var(--font-mono); font-weight:700; color:var(--wine); margin-right:6px;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ---------------- Situations professionnelles (bloc Suivi des ventes) ----------------
const SITUATIONS = {
  bilan_rayon: {
    label: "Bilan d'un rayon en fin de mois",
    context: "Vous travaillez au rayon épicerie salée d'un supermarché de taille moyenne. En fin de mois, votre responsable vous demande d'analyser les résultats du rayon pour préparer la réunion commerciale. Le chiffre d'affaires du rayon était de <b>42 000 €</b> le mois dernier et de <b>38 500 €</b> ce mois-ci. Un article vedette du rayon (une marque de pâtes) est acheté <b>0,85 € HT</b> l'unité et revendu <b>1,49 € TTC</b> (TVA 5,5%). Le stock moyen valorisé du rayon est de <b>6 200 €</b> pour un chiffre d'affaires annuel de <b>480 000 €</b>.",
    questions: [
      {type:'num', prompt:"Calculez le taux d'évolution du chiffre d'affaires de ce rayon sur le mois (en %, arrondi à 1 décimale). Ce taux est-il positif ou négatif ?", answer:-8.3, tol:0.3, unit:'%'},
      {type:'num', prompt:"Calculez la marge commerciale unitaire réalisée sur le paquet de pâtes (en €, arrondi au centime). Rappel : il faut d'abord retrouver le prix de vente HT.", answer:0.56, tol:0.03, unit:'€'},
      {type:'qcm', prompt:"Le coefficient de rotation des stocks de ce rayon est d'environ 77 (480 000 / 6 200). Comment interpréter un coefficient aussi élevé pour ce type de rayon ?", choices:["Le stock tourne très vite, ce qui est cohérent pour des produits d'épicerie à forte rotation","C'est anormalement élevé, il faut réduire les prix de vente immédiatement","Cela signifie que le magasin est en sous-effectif","Ce chiffre n'a aucun lien avec la gestion du rayon"], correct:0},
      {type:'open', prompt:"Face à la baisse de chiffre d'affaires constatée ce mois-ci, proposez et justifiez brièvement une action commerciale concrète pour ce rayon (2-3 phrases)."},
      {type:'qcm', prompt:"Quel outil est le plus adapté pour suivre l'évolution du chiffre d'affaires de ce rayon mois après mois ?", choices:["Le plan de prospection","Le tableau de bord commercial","La fiche de poste du responsable rayon","Le registre du personnel"], correct:1},
      {type:'open', prompt:"Expliquez en quelques mots comment une action de fidélisation pourrait, à moyen terme, limiter ce type de baisse de chiffre d'affaires."}
    ]
  },
  reclamation_client: {
    label: "Réclamation client : produit défectueux",
    context: "Un client se présente en caisse avec un petit électroménager (bouilloire électrique) acheté il y a 3 semaines, accompagné du ticket de caisse. L'appareil ne s'allume plus. Il a été acheté <b>34,90 € TTC</b> (TVA 20%). La garantie légale de conformité est de 2 ans. Le stock actuel de cette référence en magasin est de <b>12 unités</b>.",
    questions: [
      {type:'open', prompt:"Rédigez en 2-3 phrases la réponse que vous apporteriez oralement à ce client au comptoir, en respectant les étapes d'un bon accueil de réclamation."},
      {type:'num', prompt:"Si le magasin procède à un remboursement intégral, quel est le prix HT qui doit apparaître sur l'avoir (arrondi au centime) ?", answer:29.08, tol:0.05, unit:'€'},
      {type:'qcm', prompt:"Quel document doit être établi pour formaliser ce remboursement ou cet échange ?", choices:["Un bon de commande fournisseur","Un avoir ou un bon de remboursement","Une fiche de paie","Un plan de prospection"], correct:1},
      {type:'num', prompt:"Si l'appareil rendu par le client est retiré du stock de vente (produit défectueux, non revendable) et remplacé par un neuf pris sur le stock existant, quel est le nouveau stock disponible de cette référence (en unités) ?", answer:11, tol:0.5, unit:'unités'},
      {type:'qcm', prompt:"Le client est dans les temps pour invoquer la garantie légale de conformité car :", choices:["3 semaines est inférieur à 2 ans","La garantie légale ne s'applique qu'aux meubles","Il faut toujours plus de 6 mois pour réclamer","La garantie légale ne concerne que les achats en ligne"], correct:0},
      {type:'open', prompt:"Quelle action pourrait être proposée en plus de l'échange/remboursement pour transformer cet incident en opportunité de fidélisation ?"}
    ]
  },
  cmup_valorisation: {
    label: "Valorisation du stock — méthode CMUP",
    context: "Vous gérez le stock d'une référence de chargeurs USB-C dans un magasin d'accessoires high-tech. Au 1er du mois, le stock initial est de <b>40 unités</b>, valorisées à <b>3,00 € HT</b> l'unité. Le 8 du mois, une livraison de <b>60 unités</b> arrive, achetées à <b>3,60 € HT</b> l'unité. Le 15 du mois, <b>70 unités</b> sont sorties du stock pour être vendues, valorisées au CMUP (coût moyen unitaire pondéré) calculé après la dernière entrée.",
    questions: [
      {type:'num', prompt:"Calculez le CMUP du stock après la livraison du 8 du mois (arrondi au centime).", answer:3.36, tol:0.02, unit:'€'},
      {type:'num', prompt:"Quelle est la valeur totale de la sortie du 15 du mois, valorisée à ce CMUP (arrondi au centime) ?", answer:235.20, tol:1, unit:'€'},
      {type:'qcm', prompt:"La méthode du CMUP présente l'avantage de :", choices:["Lisser les variations de prix d'achat dans le temps","Toujours donner la valeur la plus faible possible du stock","Interdire toute variation de prix fournisseur","Remplacer l'inventaire physique"], correct:0},
      {type:'num', prompt:"Combien reste-t-il d'unités en stock après la sortie du 15 du mois ?", answer:30, tol:0.5, unit:'unités'},
      {type:'open', prompt:"Pourquoi est-il important pour l'entreprise de valoriser correctement son stock avec une méthode comme le CMUP (2-3 phrases) ?"},
      {type:'qcm', prompt:"Quelle est l'autre méthode de valorisation des stocks couramment utilisée, qui consiste à sortir en priorité les articles entrés en premier ?", choices:["PEPS (Premier Entré, Premier Sorti)","DEPS (Dernier Entré, Premier Sorti)","Le coefficient multiplicateur","Le taux de marque"], correct:0}
    ]
  },
  stock_moyen_rotation: {
    label: "Stock moyen & taux de rotation annuel",
    context: "Vous analysez la gestion d'une famille de produits sur l'année écoulée. Au 1er janvier, le stock était valorisé à <b>8 000 €</b>. Au 31 décembre, il était valorisé à <b>6 000 €</b>. Le chiffre d'affaires HT réalisé sur cette famille de produits durant l'année s'élève à <b>210 000 €</b>.",
    questions: [
      {type:'num', prompt:"Calculez le stock moyen sur l'année (en €).", answer:7000, tol:10, unit:'€'},
      {type:'num', prompt:"Calculez le taux de rotation des stocks (CA / stock moyen, arrondi à l'entier).", answer:30, tol:1, unit:'fois/an'},
      {type:'num', prompt:"Calculez la durée moyenne de stockage, en jours (360 / taux de rotation, arrondi à l'entier).", answer:12, tol:1, unit:'jours'},
      {type:'qcm', prompt:"Un taux de rotation élevé signifie généralement que :", choices:["Le stock se renouvelle rapidement, ce qui limite les coûts de stockage","Le stock est en rupture permanente","L'entreprise ne vend rien","Le prix de vente est anormalement élevé"], correct:0},
      {type:'open', prompt:"Quelles conséquences un stock qui tourne trop lentement peut-il avoir pour l'entreprise (coûts, trésorerie) ?"},
      {type:'qcm', prompt:"Pour réduire un stock qui tourne trop lentement, une action possible est :", choices:["Augmenter encore les commandes fournisseurs","Organiser une opération de déstockage ciblée","Ne rien faire et attendre","Supprimer l'inventaire annuel"], correct:1}
    ]
  },
  ecart_objectif: {
    label: "Analyse d'un écart objectif / réalisé",
    context: "En tant que responsable de rayon, vous devez analyser les résultats du mois. L'objectif de chiffre d'affaires fixé par la direction était de <b>55 000 €</b>. Le chiffre d'affaires réellement réalisé sur le mois est de <b>51 700 €</b>. L'équipe compte <b>4 vendeurs</b> sur la période.",
    questions: [
      {type:'num', prompt:"Calculez l'écart en valeur entre le réalisé et l'objectif (réalisé − objectif, en €).", answer:-3300, tol:10, unit:'€'},
      {type:'num', prompt:"Calculez cet écart en pourcentage par rapport à l'objectif (arrondi à 1 décimale).", answer:-6.0, tol:0.3, unit:'%'},

      {type:'open', prompt:"Proposez une explication possible à cet écart et une action à mettre en place pour le mois suivant (2-3 phrases)."},
      {type:'qcm', prompt:"L'outil qui permet de suivre régulièrement ce type d'écart entre objectifs et résultats est :", choices:["Le plan de prospection","Le tableau de bord commercial","La fiche de stock","Le bon de commande fournisseur"], correct:1}
    ]
  },
  panier_transformation: {
    label: "Panier moyen & taux de transformation",
    context: "Un samedi après-midi, votre magasin a comptabilisé <b>480 visiteurs</b> grâce à l'éco-compteur d'entrée. Sur cette même période, <b>96 tickets de caisse</b> ont été émis, pour un chiffre d'affaires total de <b>5 760 € TTC</b>.",
    questions: [
      {type:'num', prompt:"Calculez le panier moyen de cette période (CA / nombre de tickets, arrondi au centime).", answer:60.00, tol:0.5, unit:'€'},
      {type:'num', prompt:"Calculez le taux de transformation de cette période (%, arrondi à 1 décimale).", answer:20.0, tol:0.5, unit:'%'},
      {type:'qcm', prompt:"Le taux de transformation mesure :", choices:["La part de visiteurs qui deviennent acheteurs","Le nombre d'employés présents en magasin","La marge réalisée sur les ventes","Le stock disponible en réserve"], correct:0},
      {type:'open', prompt:"Quelle action commerciale pourrait permettre d'augmenter le panier moyen sans augmenter le nombre de clients ?"},
      {type:'qcm', prompt:"Quelle action viserait plutôt à augmenter le taux de transformation ?", choices:["Améliorer l'accueil et l'argumentaire de vente en magasin","Réduire les horaires d'ouverture du magasin","Supprimer les vendeurs en rayon","Augmenter les prix de 50%"], correct:0},
      {type:'num', prompt:"Si le taux de transformation passait à 25% avec le même nombre de visiteurs (480), combien de tickets de caisse cela représenterait-il (arrondi à l'entier) ?", answer:120, tol:1, unit:'tickets'}
    ]
  }

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function round2(n){return Math.round(n*100)/100;}
function q(text, answer, unit, tol){ return {type:'num', q:text, answer, unit, tol}; }

const TRAIN_THEMES = {
  ht_ttc: {label:'Passage HT ↔ TTC'},
  remise: {label:'Réductions / remises'},
  taux_evolution: {label:"Taux d'évolution"},
  marge_marque: {label:'Marge & taux de marque'},
  coefficient: {label:'Coefficient multiplicateur'},
  soldes_demarque: {label:'Soldes & démarque'},
  stock_final: {label:'Entrées / sorties de stock'},
  reappro: {label:'Réapprovisionnement'},
  rupture: {label:'Rupture & rotation des stocks'}
};
const TRAIN_LEN = 20;

function genHtTtc(diff){
  if(diff==='facile'){
    const tpl=rnd(0,1);
    if(tpl===0){ const ht=rnd(10,100); const tva=[10,20][rnd(0,1)];
      return q(`Un article coûte <b>${ht} € HT</b>. TVA à <b>${tva}%</b>. Prix TTC (arrondi au centime) ?`, round2(ht*(1+tva/100)), '€', 0.05); }
    const ttc=rnd(12,120); const tva=[10,20][rnd(0,1)];
    return q(`Un article est à <b>${ttc} € TTC</b>, TVA <b>${tva}%</b>. Prix HT (arrondi au centime) ?`, round2(ttc/(1+tva/100)), '€', 0.05);
  }
  if(diff==='moyen'){
    const tpl=rnd(0,1);
    if(tpl===0){ const ht=round2(rnd(1000,30000)/100); const tva=[5.5,10,20][rnd(0,2)];
      return q(`Un article coûte <b>${ht} € HT</b>. TVA à <b>${tva}%</b>. Prix TTC (arrondi au centime) ?`, round2(ht*(1+tva/100)), '€', 0.05); }
    const ttc=round2(rnd(1200,36000)/100); const tva=[5.5,10,20][rnd(0,2)];
    return q(`Un article est à <b>${ttc} € TTC</b>, TVA <b>${tva}%</b>. Prix HT (arrondi au centime) ?`, round2(ttc/(1+tva/100)), '€', 0.05);
  }
  const qte=rnd(2,8); const pu=round2(rnd(500,4000)/100); const tva=[5.5,10,20][rnd(0,2)];
  const totalHt = round2(qte*pu);
  return q(`Un client achète <b>${qte}</b> articles à <b>${pu} € HT</b> l'unité. TVA <b>${tva}%</b>. Montant total TTC (arrondi au centime) ?`, round2(totalHt*(1+tva/100)), '€', 0.1);
}
function genRemise(diff){
  if(diff==='facile'){ const pu=rnd(20,150); const remise=[10,15,20,25][rnd(0,3)];
    return q(`Un article à <b>${pu} €</b> bénéficie d'une remise de <b>${remise}%</b>. Prix net (arrondi au centime) ?`, round2(pu*(1-remise/100)), '€', 0.05); }
  if(diff==='moyen'){ const pu=rnd(15,80); const remise=rnd(2,20);
    return q(`Un article à <b>${pu} €</b> bénéficie d'une remise de <b>${remise} €</b>. Quel est le taux de remise en pourcentage (arrondi à 1 décimale) ?`, round2(100*remise/pu), '%', 0.3); }
  const pu=rnd(80,300); const r1=[10,20][rnd(0,1)]; const r2=[5,10][rnd(0,1)];
  return q(`Prix de <b>${pu} €</b>, remises en cascade de <b>${r1}%</b> puis <b>${r2}%</b>. Prix net final (arrondi au centime) ?`, round2(pu*(1-r1/100)*(1-r2/100)), '€', 0.1);
}
function genTauxEvolution(diff){
  if(diff==='facile'){ const v1=rnd(100,400); const pct=rnd(5,30); const v2=Math.round(v1*(1+pct/100));
    return q(`Le CA passe de <b>${v1} €</b> à <b>${v2} €</b>. Taux d'évolution (%, arrondi à l'entier) ?`, Math.round(100*(v2-v1)/v1), '%', 1); }
  if(diff==='moyen'){ const v1=rnd(100,500); const pct=rnd(-30,40); const v2=round2(v1*(1+pct/100));
    return q(`Le CA passe de <b>${v1} €</b> à <b>${v2} €</b>. Taux d'évolution (%, 1 décimale) ?`, round2(pct), '%', 0.3); }
  const v1=rnd(200,900); const pct=rnd(-25,35);
  const v2=round2(v1*(1+pct/100));
  return q(`Le CA était de <b>${v1} €</b>. Il évolue de <b>${pct}%</b>. Quel est le nouveau CA (arrondi à l'euro) ?`, Math.round(v2), '€', 1);
}
function genMargeMarque(diff){
  if(diff==='facile'){ const pa=rnd(10,80); const pv=round2(pa*(1+rnd(20,80)/100));
    return q(`Prix d'achat : <b>${pa} €</b>. Prix de vente : <b>${pv} €</b>. Quelle est la marge commerciale en euros ?`, round2(pv-pa), '€', 0.05); }
  if(diff==='moyen'){ const pa=rnd(20,100); const marge=round2(pa*(rnd(20,60)/100)); const pv=round2(pa+marge);
    return q(`Prix d'achat : <b>${pa} €</b>, prix de vente : <b>${pv} €</b>. Quel est le taux de marque (marge / prix de vente × 100), arrondi à 1 décimale ?`, round2(100*(pv-pa)/pv), '%', 0.5); }
  const pa=rnd(20,100); const tauxMarque=rnd(25,45);
  return q(`Prix d'achat : <b>${pa} €</b>. L'entreprise vise un taux de marque de <b>${tauxMarque}%</b>. Quel doit être le prix de vente (arrondi au centime) ?`, round2(pa/(1-tauxMarque/100)), '€', 0.5);
}
function genCoefficient(diff){
  if(diff==='facile'){ const pa=rnd(10,60); const coef=[1.5,2,2.5][rnd(0,2)];
    return q(`Prix d'achat HT : <b>${pa} €</b>. Coefficient multiplicateur : <b>${coef}</b>. Prix de vente TTC (arrondi au centime) ?`, round2(pa*coef), '€', 0.1); }
  if(diff==='moyen'){ const pa=rnd(15,90); const coef=round2(rnd(150,280)/100);
    return q(`Prix d'achat HT : <b>${pa} €</b>. Coefficient multiplicateur : <b>${coef}</b>. Prix de vente TTC (arrondi au centime) ?`, round2(pa*coef), '€', 0.1); }
  const pv=rnd(30,200); const coef=round2(rnd(150,280)/100);
  return q(`Prix de vente TTC : <b>${pv} €</b>. Coefficient multiplicateur appliqué : <b>${coef}</b>. Quel était le prix d'achat HT (arrondi au centime) ?`, round2(pv/coef), '€', 0.1);
}
function genSoldesDemarque(diff){
  if(diff==='facile'){ const pv=rnd(30,150); const demarque=rnd(10,30);
    return q(`Un article à <b>${pv} €</b> est soldé avec une démarque de <b>${demarque}%</b>. Quel est le nouveau prix de vente (arrondi au centime) ?`, round2(pv*(1-demarque/100)), '€', 0.1); }
  if(diff==='moyen'){ const pa=rnd(20,100); const pv=round2(pa*1.7); const solde=rnd(20,40);
    const pvsolde = round2(pv*(1-solde/100));
    return q(`Prix d'achat : <b>${pa} €</b>, prix de vente initial : <b>${pv} €</b>. Après une démarque de <b>${solde}%</b> en solde, quelle est la marge restante en euros (prix soldé − prix d'achat) ?`, round2(pvsolde-pa), '€', 0.15); }
  const pv=rnd(80,300); const solde1=[20,30][rnd(0,1)]; const solde2=[10,20][rnd(0,1)];
  const finalPrice = round2(pv*(1-solde1/100)*(1-solde2/100));
  return q(`Un article à <b>${pv} €</b> subit une première démarque de <b>${solde1}%</b> (2e semaine de soldes), puis une seconde démarque de <b>${solde2}%</b> (démarque finale). Prix final (arrondi au centime) ?`, finalPrice, '€', 0.15);
}
function genStockFinal(diff){
  if(diff==='facile'){ const a=rnd(50,200), b=rnd(20,100), c=rnd(10,80);
    return q(`Stock initial : <b>${a}</b> unités. Livraison : <b>${b}</b>. Ventes : <b>${c}</b>. Stock final ?`, a+b-c, 'unités', 0.5); }
  if(diff==='moyen'){ const si=rnd(50,150), sf=rnd(10,49), livr=rnd(20,80);
    return q(`Stock initial : <b>${si}</b> unités, livraison de <b>${livr}</b> unités, stock final : <b>${sf}</b> unités. Combien d'unités ont été vendues ?`, si+livr-sf, 'unités', 0.5); }
  const nb=rnd(5,20), carton=rnd(6,24), c=rnd(10,60);
  return q(`Un réassort arrive en <b>${nb}</b> cartons de <b>${carton}</b> unités chacun. Après avoir vendu <b>${c}</b> unités ce jour-là, combien reste-t-il en stock (à partir de ce réassort) ?`, (nb*carton)-c, 'unités', 0.5);
}
function genReappro(diff){
  if(diff==='facile'){ const a=rnd(15,40); const b=rnd(5,a);
    return q(`Stock de sécurité : <b>${a}</b> unités. Stock actuel : <b>${b}</b>. Combien réapprovisionner pour revenir à 2 fois le stock de sécurité ?`, (2*a)-b, 'unités', 0.5); }
  if(diff==='moyen'){ const smax=rnd(80,150), stockActuel=rnd(5,79);
    return q(`Stock maximum souhaité : <b>${smax}</b>, stock actuel : <b>${stockActuel}</b>. Quelle quantité commander pour atteindre le stock maximum ?`, smax-stockActuel, 'unités', 0.5); }
  const conso=rnd(5,20); const delai=rnd(3,10);
  return q(`Consommation moyenne journalière : <b>${conso}</b> unités. Délai de livraison fournisseur : <b>${delai}</b> jours. Quel est le stock d'alerte (seuil de commande) ?`, conso*delai, 'unités', 0.5);
}
function genRupture(diff){
  if(diff==='facile'){ const conso=rnd(8,25); const stock=rnd(60,200);
    return q(`Consommation moyenne journalière : <b>${conso}</b> unités. Stock actuel : <b>${stock}</b> unités. Dans combien de jours le stock sera-t-il épuisé (arrondi à l'entier) ?`, Math.round(stock/conso), 'jours', 0.5); }
  if(diff==='moyen'){ const casesTot=rnd(200,500), casesVendues=rnd(50,199);
    return q(`Le stock initial de la période était de <b>${casesTot}</b> unités, il en reste <b>${casesTot-casesVendues}</b>. Quel est le taux d'écoulement du stock (%, arrondi à 1 décimale) ?`, round2(100*casesVendues/casesTot), '%', 0.5); }
  const caAnnuel=rnd(20000,80000); const stockMoyen=rnd(2000,8000);
  return q(`CA annuel réalisé sur cette famille de produits : <b>${caAnnuel} €</b>. Stock moyen valorisé : <b>${stockMoyen} €</b>. Quel est le coefficient de rotation des stocks (arrondi à 1 décimale) ?`, round2(caAnnuel/stockMoyen), 'fois/an', 0.2);
}
const TRAIN_GEN = { ht_ttc:genHtTtc, remise:genRemise, taux_evolution:genTauxEvolution, marge_marque:genMargeMarque, coefficient:genCoefficient, soldes_demarque:genSoldesDemarque, stock_final:genStockFinal, reappro:genReappro, rupture:genRupture };
function pickTrainDifficulty(records, student, classe, theme){
  const mine = records.filter(r=>r.student===student && r.classe===classe && r.theme===theme).slice(-4);
  if(mine.length===0) return 'moyen';
  const pct = 100*mine.filter(r=>r.correct).length/mine.length;
  if(pct<40) return 'facile';
  if(pct<75) return 'moyen';
  return 'difficile';
}

async function beginSession_(classe){
  state.sessionClasse = classe;
  await saveStudent(state.studentName, classe);
  if(state.mode==='entrainement'){ state.trainRecords = await loadTrainRecords(); }
  render();
}

function clearTimer_(){ if(state.timerInterval){ clearInterval(state.timerInterval); state.timerInterval=null; } }
function startTimer_(){
  clearTimer_();
  state.timeLeft = 30;
  state.timerInterval = setInterval(()=>{
    state.timeLeft--;
    const el = document.getElementById('timer-display');
    if(el) el.textContent = `⏱ ${state.timeLeft}s`;
    if(state.timeLeft<=0){ clearTimer_(); handleTrainTimeout_(); }
  }, 1000);
}
async function handleTrainTimeout_(){
  if(state.trainAnswered) return;
  state.trainAnswered = true; state.trainLastCorrect = false;
  const ex = state.trainExercise;
  const rec = {student:state.studentName, classe:state.sessionClasse, theme:state.sessionTrainTheme, correct:false, ts:Date.now()};
  await saveTrainRecord(rec);
  state.trainRecords.push(rec);
  render();
}

function render(){
  const app = document.getElementById('app');

function attachEleveHandlers(){
  const startBtn = document.getElementById('start-btn');
  if(startBtn){
    startBtn.onclick = async ()=>{
      const val = document.getElementById('name-input').value.trim();
      if(!val) return;
      state.studentName = val;
      const rosters = await loadRosters();
      const norm = s => s.trim().toLowerCase();
      const matches = state.classNames.filter(cn => (rosters[cn]||[]).some(n => norm(n)===norm(val)));
      if(matches.length===1){ await beginSession_(matches[0]); } else { render(); }
    };
  }
  document.querySelectorAll('.choice[data-qi]').forEach(el=>{
    el.onclick = ()=>{ state.selectedChoices[el.dataset.qi] = parseInt(el.dataset.ci); render(); };
  });
  document.querySelectorAll('.num-input, .open-input').forEach(el=>{
    el.oninput = (e)=>{ state.answers[el.dataset.qi] = e.target.value; };
  });
  const submitBtn = document.getElementById('submit-btn');
  if(submitBtn){
    submitBtn.onclick = async ()=>{
      const sit = SITUATIONS[state.sessionSituation];
      const answers = sit.questions.map((q,i)=>{
        if(q.type==='qcm'){
          const chosen = state.selectedChoices[i];
          const correct = chosen===q.correct;
          return {qIndex:i, type:'qcm', studentAnswer: chosen!==undefined ? q.choices[chosen] : null, autoCorrect: correct, points: correct?1:0};
        }
        if(q.type==='num'){
          const v = parseFloat(state.answers[i]);
          const correct = !isNaN(v) && Math.abs(v-q.answer)<=q.tol;
          return {qIndex:i, type:'num', studentAnswer: state.answers[i]||'', autoCorrect: correct, points: correct?1:0};
        }
        return {qIndex:i, type:'open', studentAnswer: state.answers[i]||'', autoCorrect: null, points: null};
      });
      const sub = {
        id: uid_(), student: state.studentName, classe: state.sessionClasse,
        situationId: state.sessionSituation, ts: Date.now(),
        answers, graded: answers.every(a=>a.points!==null)
      };
      await saveSubmission(sub);
      state.submitted = true;
      render();
    };
  }

  const trainInput = document.getElementById('train-input');
  if(trainInput) trainInput.oninput = (e)=>{ state.trainAnswer = e.target.value; };
  const trainValidateBtn = document.getElementById('train-validate-btn');
  if(trainValidateBtn){
    trainValidateBtn.onclick = async ()=>{
      const ex = state.trainExercise;
      const v = parseFloat(state.trainAnswer);
      if(isNaN(v)) return;
      clearTimer_();
      const correct = Math.abs(v-ex.answer)<=ex.tol;
      state.trainAnswered = true; state.trainLastCorrect = correct;
      if(correct) state.trainCorrect++;
      const rec = {student:state.studentName, classe:state.sessionClasse, theme:state.sessionTrainTheme, correct, ts:Date.now()};
      await saveTrainRecord(rec);
      state.trainRecords.push(rec);
      render();
    };
  }
  const trainNextBtn = document.getElementById('train-next-btn');
  if(trainNextBtn){
    trainNextBtn.onclick = ()=>{
      state.trainIndex++;
      state.trainExercise = null;
      if(state.trainIndex>=TRAIN_LEN) state.trainDone = true;
      render();
    };
  }
}

function computeNote_(sub){
  const total = sub.answers.length;
  const pts = sub.answers.reduce((s,a)=> s + (a.points||0), 0);
  return Math.round((pts/total)*5*2)/2;
}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div><label class="muted" style="font-size:12px;">${classNames[0]}</label>
        <textarea id="roster-0" rows="8" style="width:100%;font-family:var(--font-mono);font-size:13px;padding:8px;border:1px solid var(--ink);background:var(--paper);color:var(--ink);">${(rosters[classNames[0]]||[]).join('\n')}</textarea></div>
      <div><label class="muted" style="font-size:12px;">${classNames[1]}</label>
        <textarea id="roster-1" rows="8" style="width:100%;font-family:var(--font-mono);font-size:13px;padding:8px;border:1px solid var(--ink);background:var(--paper);color:var(--ink);">${(rosters[classNames[1]]||[]).join('\n')}</textarea></div>
    </div>
    <button class="btn secondary" id="roster-save" style="margin-top:8px;">Enregistrer les listes</button>`;

  html += `<hr style="margin:26px 0;border:none;border-top:1px solid var(--paper-line);"><h2 style="font-size:18px;">Situation du jour</h2>
    <p class="muted">Choisis la situation professionnelle de la séance : un QR / lien unique est généré, valable pour les deux classes.</p>
    <div class="themepick">`;
  Object.entries(SITUATIONS).forEach(([k,s])=>{
    html += `<div class="themebtn ${picked===k?'active':''}" data-k="${k}" style="${picked===k?'background:var(--wine);color:#fff;border-color:var(--wine);':''}">${s.label}</div>`;
  });
  html += `</div>`;
  if(picked && !publicUrl){
    html += `<p class="muted" style="color:var(--wine);margin-top:10px;">⚠ Renseigne d'abord le lien public de la page.</p>`;
  }
  if(picked && url){
    html += `<p class="muted">Lien de la séance :<br><span style="font-family:var(--font-mono);font-size:12px;">${url}</span></p>
    <div id="qr-box"></div>`;
  }

  // --- Entraînement — remise à niveau ---
  const pickedTrain = state.teacherPickedTrainTheme;
  const trainUrl = (pickedTrain && publicUrl) ? `${publicUrl}?entrainement=${pickedTrain}` : null;
  html += `<hr style="margin:26px 0;border:none;border-top:1px solid var(--paper-line);"><h2 style="font-size:18px;">Entraînement — remise à niveau</h2>
    <p class="muted">Séance libre non notée (${TRAIN_LEN} questions), pour réviser les calculs de base. Choisis un thème :</p>
    <div class="themepick">`;
  Object.entries(TRAIN_THEMES).forEach(([k,t])=>{
    html += `<div class="themebtn train-theme-pick ${pickedTrain===k?'active':''}" data-k="${k}" style="${pickedTrain===k?'background:var(--gold);color:#fff;border-color:var(--gold);':''}">${t.label}</div>`;
  });
  html += `</div>`;
  if(pickedTrain && !publicUrl){
    html += `<p class="muted" style="color:var(--wine);margin-top:10px;">⚠ Renseigne d'abord le lien public de la page.</p>`;
  }
  if(pickedTrain && trainUrl){
    html += `<p class="muted">Lien d'entraînement :<br><span style="font-family:var(--font-mono);font-size:12px;">${trainUrl}</span></p>
    <div id="qr-box-train"></div>`;
  }

  // --- Corrections à faire ---
  const pending = submissions.filter(s=>!s.graded);
  html += `<hr style="margin:26px 0;border:none;border-top:1px solid var(--paper-line);"><h2 style="font-size:18px;">Corrections à faire (${pending.length})</h2>`;
  if(pending.length===0){
    html += `<p class="muted">Rien à corriger pour l'instant.</p>`;
  } else {
    pending.forEach(sub=>{
      const sit = SITUATIONS[sub.situationId];
      html += `<div class="card"><b>${sub.student}</b> <span class="muted">(${sub.classe} · ${sit.label})</span>`;
      sub.answers.forEach((a,i)=>{
        if(a.type==='open'){
          html += `<div style="margin-top:10px;">
            <div class="muted" style="font-size:12px;">${sit.questions[i].prompt}</div>
            <div style="padding:8px;background:var(--paper);margin:6px 0;font-size:14px;">${a.studentAnswer || '<i>(vide)</i>'}</div>
            <div style="display:flex;gap:6px;">
              <button class="btn secondary grade-btn" data-sub="${sub.id}" data-qi="${i}" data-pts="0" style="margin-top:0;padding:6px 12px;">0 pt</button>
              <button class="btn secondary grade-btn" data-sub="${sub.id}" data-qi="${i}" data-pts="0.5" style="margin-top:0;padding:6px 12px;">0.5 pt</button>
              <button class="btn secondary grade-btn" data-sub="${sub.id}" data-qi="${i}" data-pts="1" style="margin-top:0;padding:6px 12px;">1 pt</button>
            </div>
          </div>`;
        }
      });
      html += `</div>`;
    });
  }

  // --- Notes ---
  html += `<hr style="margin:26px 0;border:none;border-top:1px solid var(--paper-line);"><h2 style="font-size:18px;">Notes</h2>`;
  if(submissions.length===0){
    html += `<p class="muted">Aucune évaluation reçue pour le moment.</p>`;
  } else {
    classNames.forEach(cn=>{
      const subs = submissions.filter(s=>s.classe===cn).sort((a,b)=>b.ts-a.ts);
      html += `<div class="domgroup-title" style="margin-top:10px;">${cn}</div>`;
      if(subs.length===0){ html += `<p class="muted" style="font-size:12px;">Aucune évaluation.</p>`; }
      else {
        html += `<table><thead><tr><th>Élève</th><th>Situation</th><th>Statut</th><th>Note</th></tr></thead><tbody>`;
        subs.forEach(s=>{
          const note = computeNote_(s);
          html += `<tr><td><b>${s.student}</b></td><td>${SITUATIONS[s.situationId].label}</td><td>${s.graded?'Corrigé':'En attente'}</td><td><b>${note}/5</b></td></tr>`;
        });
        html += `</tbody></table>`;
      }
    });
  }

  el.innerHTML = html;

  document.querySelectorAll('.themepick .themebtn[data-k]:not(.train-theme-pick)').forEach(btn=>{
    btn.onclick = ()=>{ state.teacherPickedSituation = btn.dataset.k; renderEnseignant(); };
  });
  document.querySelectorAll('.train-theme-pick').forEach(btn=>{
    btn.onclick = ()=>{ state.teacherPickedTrainTheme = btn.dataset.k; renderEnseignant(); };
  });
  const purlSave = document.getElementById('publicurl-save');
  if(purlSave) purlSave.onclick = async ()=>{
    const val = document.getElementById('publicurl-input').value.trim().replace(/\/$/,'');
    await savePublicUrl(val); state.publicUrl = val; renderEnseignant();
  };
  const cn0 = document.getElementById('classname-0');
  const cn1 = document.getElementById('classname-1');
  if(cn0) cn0.onchange = async (e)=>{ await saveClassNames([e.target.value.trim()||'TCOM1', classNames[1]]); renderEnseignant(); };
  if(cn1) cn1.onchange = async (e)=>{ await saveClassNames([classNames[0], e.target.value.trim()||'TCOM2']); renderEnseignant(); };
  const rosterSave = document.getElementById('roster-save');
  if(rosterSave) rosterSave.onclick = async ()=>{
    const parseNames = txt => txt.split('\n').map(s=>s.trim()).filter(Boolean);
    const newRosters = { ...rosters, [classNames[0]]: parseNames(document.getElementById('roster-0').value), [classNames[1]]: parseNames(document.getElementById('roster-1').value) };
    await saveRosters(newRosters); renderEnseignant();
  };
  document.querySelectorAll('.grade-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      const subId = btn.dataset.sub; const qi = parseInt(btn.dataset.qi); const pts = parseFloat(btn.dataset.pts);
      const sub = submissions.find(s=>s.id===subId);
      const newAnswers = sub.answers.map((a,i)=> i===qi ? {...a, points:pts} : a);
      const graded = newAnswers.every(a=>a.points!==null);
      await updateSubmission(subId, {answers:newAnswers, graded});
      renderEnseignant();
    };
  });

  if(picked && url){
    const qrBox = document.getElementById('qr-box');
    if(qrBox && window.QRCode){ qrBox.innerHTML=''; new QRCode(qrBox, {text:url, width:160, height:160}); }
  }
  if(pickedTrain && trainUrl){
    const qrBoxTrain = document.getElementById('qr-box-train');
    if(qrBoxTrain && window.QRCode){ qrBoxTrain.innerHTML=''; new QRCode(qrBoxTrain, {text:trainUrl, width:160, height:160}); }
  }
}

(async function init(){ state.classNames = await loadClassNames(); state.publicUrl = await loadPublicUrl(); render(); if(isTeacher) renderEnseignant(); })();
</script>
</body>
</html>
