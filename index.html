<style>
  :root{
    --ink:#1C2541; --paper:#F5F3EC; --paper-line:#E4E0D3;
    --gold:#C9973D; --teal:#2E8B79; --indigo:#4A5B8C; --coral:#C1533B;
    --font-display:'Fraunces', Georgia, serif;
    --font-body:'Work Sans', Arial, sans-serif;
    --font-mono:'IBM Plex Mono', 'Courier New', monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');
  *{box-sizing:border-box;}
  #app{font-family:var(--font-body); color:var(--ink); background:var(--paper); min-height:100vh;}
  .wrap{max-width:680px;margin:0 auto;padding:28px 20px 60px;}
  h1,h2,h3{font-family:var(--font-display); margin:0 0 6px;}
  .eyebrow{font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--indigo); margin-bottom:6px;}
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:12px; flex-wrap:wrap;}
  .toggle{display:flex; border:1.5px solid var(--ink); border-radius:999px; overflow:hidden; font-family:var(--font-mono); font-size:12px;}
  .toggle button{background:none; border:none; padding:7px 14px; cursor:pointer; color:var(--ink); font-family:inherit;}
  .toggle button.active{background:var(--ink); color:var(--paper);}
  .card{background:#fff; border:1.5px solid var(--ink); border-radius:4px; padding:22px; margin-bottom:16px;}
  .receipt{background:#fff; border:1.5px solid var(--ink); padding:26px 24px 30px; position:relative;}
  .receipt::before,.receipt::after{content:"";position:absolute;left:0;right:0;height:10px;background-image:radial-gradient(circle,var(--paper) 5px,transparent 5.5px);background-size:16px 16px;background-repeat:repeat-x;}
  .receipt::before{top:-6px;} .receipt::after{bottom:-6px;transform:rotate(180deg);}
  .tag{display:inline-block; font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; padding:4px 10px; border-radius:999px; color:#fff; margin-bottom:10px; margin-right:6px;}
  .tag.outline{background:none;border:1.5px solid currentColor;}
  .progress{font-family:var(--font-mono); font-size:11px; color:var(--indigo); margin-bottom:12px;}
  .qtext{font-size:17px; line-height:1.5; margin:14px 0 18px;}
  .qtext b{font-family:var(--font-mono);}
  input[type=text],input[type=number],select{width:100%; font-family:var(--font-mono); font-size:16px; padding:10px 12px; border:1.5px solid var(--ink); border-radius:3px; background:var(--paper); color:var(--ink);}
  .choices{display:flex; flex-direction:column; gap:8px; margin-top:4px;}
  .choice{border:1.5px solid var(--ink); border-radius:3px; padding:10px 14px; cursor:pointer; font-size:15px; background:#fff;}
  .choice:hover{background:var(--paper);}
  .choice.selected{background:var(--ink); color:#fff;}
  .btn{font-family:var(--font-mono); font-size:13px; letter-spacing:.05em; text-transform:uppercase; background:var(--ink); color:var(--paper); border:none; padding:12px 22px; border-radius:3px; cursor:pointer; margin-top:16px;}
  .btn:hover{opacity:.88;}
  .btn.secondary{background:none; color:var(--ink); border:1.5px solid var(--ink);}
  .feedback{margin-top:16px; padding:14px; border-radius:3px; font-size:14px; font-family:var(--font-mono);}
  .feedback.good{background:rgba(46,139,121,.12); color:var(--teal); border:1px solid var(--teal);}
  .feedback.bad{background:rgba(193,83,58,.12); color:var(--coral); border:1px solid var(--coral);}
  table{width:100%; border-collapse:collapse; font-size:13px; margin-top:8px;}
  th,td{padding:8px 10px; border-bottom:1px solid var(--paper-line); text-align:left; vertical-align:middle;}
  th{font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--indigo);}
  .lvl{display:inline-block; padding:3px 9px; border-radius:999px; font-family:var(--font-mono); font-size:11px; color:#fff; white-space:nowrap;}
  .muted{color:#6b6a63; font-size:13px;}
  .domgroup{margin-bottom:16px;}
  .domgroup-title{font-family:var(--font-mono); font-size:12px; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px;}
  .themepick{display:flex; flex-wrap:wrap; gap:8px;}
  .themebtn{border:1.5px solid var(--ink); border-radius:999px; padding:8px 14px; cursor:pointer; background:#fff; font-size:13px;}
  .themebtn.active{color:#fff;}
  #qr-box{background:#fff; padding:12px; display:inline-block; border:1.5px solid var(--ink); margin-top:12px;}
  .sumbar{display:flex; height:10px; border-radius:99px; overflow:hidden; border:1px solid var(--ink); margin-top:6px;}
  .sumbar div{height:100%;}
</style>
<script>
const DOMAINS = {
  accueil: {label:"Accueil & relation client", hex:"#2E8B79"},
  calcul: {label:"Calculs commerciaux", hex:"#C9973D"},
  flux: {label:"Gestion des flux / stocks", hex:"#4A5B8C"},
  anim: {label:"Animation commerciale", hex:"#C1533B"}
};
const THEMES = {
  ht_ttc: {domain:'calcul', label:'Passage HT ↔ TTC'},
  remise: {domain:'calcul', label:'Réductions / remises'},
  taux_evolution: {domain:'calcul', label:"Taux d'évolution"},
  marge_marque: {domain:'calcul', label:'Marge & taux de marque'},
  coefficient: {domain:'calcul', label:'Coefficient multiplicateur'},
  stock_final: {domain:'flux', label:'Entrées / sorties de stock'},
  reappro: {domain:'flux', label:'Réapprovisionnement'},
  rupture: {domain:'flux', label:'Rupture & rotation des stocks'},
  contact: {domain:'accueil', label:'Prise de contact & attitude'},
  decouverte: {domain:'accueil', label:'Découverte des besoins'},
  objection: {domain:'accueil', label:'Objections & réclamations'},
  marchandisage: {domain:'anim', label:'Marchandisage & vitrine'},
  promo_fid: {domain:'anim', label:'Promotion & fidélisation'},
  efficacite: {domain:'anim', label:"Mesure de l'efficacité"}
};
const SESSION_LEN = 20;
const TIME_PER_QUESTION = 30; // secondes
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function round2(n){return Math.round(n*100)/100;}

// ---------------- Générateurs par thème (niveau seconde, référentiel MCV) ----------------
function genHtTtc(diff){
  if(diff==='facile'){
    const tpl=rnd(0,1);
    if(tpl===0){ const ht=rnd(10,100); const tva=[10,20][rnd(0,1)];
      return q(`Un article coûte <b>${ht} € HT</b>. TVA à <b>${tva}%</b>. Prix TTC (arrondi au centime) ?`, round2(ht*(1+tva/100)), '€', 0.05); }
    const ttc=rnd(12,120); const tva=[10,20][rnd(0,1)];
    return q(`Un article est à <b>${ttc} € TTC</b>, TVA <b>${tva}%</b>. Prix HT (arrondi au centime) ?`, round2(ttc/(1+tva/100)), '€', 0.05);
  }
  if(diff==='moyen'){
    const tpl=rnd(0,1);
    if(tpl===0){ const ht=round2(rnd(1000,30000)/100); const tva=[5.5,10,20][rnd(0,2)];
      return q(`Un article coûte <b>${ht} € HT</b>. TVA à <b>${tva}%</b>. Prix TTC (arrondi au centime) ?`, round2(ht*(1+tva/100)), '€', 0.05); }
    const ttc=round2(rnd(1200,36000)/100); const tva=[5.5,10,20][rnd(0,2)];
    return q(`Un article est à <b>${ttc} € TTC</b>, TVA <b>${tva}%</b>. Prix HT (arrondi au centime) ?`, round2(ttc/(1+tva/100)), '€', 0.05);
  }
  const qte=rnd(2,8); const pu=round2(rnd(500,4000)/100); const tva=[5.5,10,20][rnd(0,2)];
  const totalHt = round2(qte*pu);
  return q(`Un client achète <b>${qte}</b> articles à <b>${pu} € HT</b> l'unité. TVA <b>${tva}%</b>. Montant total TTC (arrondi au centime) ?`, round2(totalHt*(1+tva/100)), '€', 0.1);
}

function genRemise(diff){
  if(diff==='facile'){ const pu=rnd(20,150); const remise=[10,15,20,25][rnd(0,3)];
    return q(`Un article à <b>${pu} €</b> bénéficie d'une remise de <b>${remise}%</b>. Prix net (arrondi au centime) ?`, round2(pu*(1-remise/100)), '€', 0.05); }
  if(diff==='moyen'){ const pu=rnd(15,80); const remise=rnd(2,20);
    return q(`Un article à <b>${pu} €</b> bénéficie d'une remise de <b>${remise} €</b>. Quel est le taux de remise en pourcentage (arrondi à 1 décimale) ?`, round2(100*remise/pu), '%', 0.3); }
  const pu=rnd(80,300); const r1=[10,20][rnd(0,1)]; const r2=[5,10][rnd(0,1)];
  return q(`Prix de <b>${pu} €</b>, remises en cascade de <b>${r1}%</b> puis <b>${r2}%</b>. Prix net final (arrondi au centime) ?`, round2(pu*(1-r1/100)*(1-r2/100)), '€', 0.1);
}

function genTauxEvolution(diff){
  if(diff==='facile'){ const v1=rnd(100,400); const pct=rnd(5,30); const v2=Math.round(v1*(1+pct/100));
    return q(`Le CA passe de <b>${v1} €</b> à <b>${v2} €</b>. Taux d'évolution (%, arrondi à l'entier) ?`, Math.round(100*(v2-v1)/v1), '%', 1); }
  if(diff==='moyen'){ const v1=rnd(100,500); const pct=rnd(-30,40); const v2=round2(v1*(1+pct/100));
    return q(`Le CA passe de <b>${v1} €</b> à <b>${v2} €</b>. Taux d'évolution (%, 1 décimale) ?`, round2(pct), '%', 0.3); }
  const v1=rnd(200,900); const pct=rnd(-25,35);
  const v2=round2(v1*(1+pct/100));
  return q(`Le CA était de <b>${v1} €</b>. Il évolue de <b>${pct}%</b>. Quel est le nouveau CA (arrondi à l'euro) ?`, Math.round(v2), '€', 1);
}

function genMargeMarque(diff){
  if(diff==='facile'){ const pa=rnd(10,80); const pv=round2(pa*(1+rnd(20,80)/100));
    return q(`Prix d'achat : <b>${pa} €</b>. Prix de vente : <b>${pv} €</b>. Quelle est la marge commerciale en euros ?`, round2(pv-pa), '€', 0.05); }
  if(diff==='moyen'){ const pa=rnd(20,100); const marge=round2(pa*(rnd(20,60)/100)); const pv=round2(pa+marge);
    return q(`Prix d'achat : <b>${pa} €</b>, prix de vente : <b>${pv} €</b>. Quel est le taux de marque (marge / prix de vente × 100), arrondi à 1 décimale ?`, round2(100*(pv-pa)/pv), '%', 0.5); }
  const pa=rnd(20,100); const tauxMarque=rnd(25,45);
  return q(`Prix d'achat : <b>${pa} €</b>. L'entreprise vise un taux de marque de <b>${tauxMarque}%</b>. Quel doit être le prix de vente (arrondi au centime) ?`, round2(pa/(1-tauxMarque/100)), '€', 0.5);
}

function genCoefficient(diff){
  if(diff==='facile'){ const pa=rnd(10,60); const coef=[1.5,2,2.5][rnd(0,2)];
    return q(`Prix d'achat HT : <b>${pa} €</b>. Coefficient multiplicateur : <b>${coef}</b>. Prix de vente TTC (arrondi au centime) ?`, round2(pa*coef), '€', 0.1); }
  if(diff==='moyen'){ const pa=rnd(15,90); const coef=round2(rnd(150,280)/100);
    return q(`Prix d'achat HT : <b>${pa} €</b>. Coefficient multiplicateur : <b>${coef}</b>. Prix de vente TTC (arrondi au centime) ?`, round2(pa*coef), '€', 0.1); }
  const pv=rnd(30,200); const coef=round2(rnd(150,280)/100);
  return q(`Prix de vente TTC : <b>${pv} €</b>. Coefficient multiplicateur appliqué : <b>${coef}</b>. Quel était le prix d'achat HT (arrondi au centime) ?`, round2(pv/coef), '€', 0.1);
}

function genStockFinal(diff){
  if(diff==='facile'){ const a=rnd(50,200), b=rnd(20,100), c=rnd(10,80);
    return q(`Stock initial : <b>${a}</b> unités. Livraison : <b>${b}</b>. Ventes : <b>${c}</b>. Stock final ?`, a+b-c, 'unités', 0.5); }
  if(diff==='moyen'){ const si=rnd(50,150), sf=rnd(10,49), livr=rnd(20,80);
    return q(`Stock initial : <b>${si}</b> unités, livraison de <b>${livr}</b> unités, stock final : <b>${sf}</b> unités. Combien d'unités ont été vendues ?`, si+livr-sf, 'unités', 0.5); }
  const nb=rnd(5,20), carton=rnd(6,24), c=rnd(10,60);
  return q(`Un réassort arrive en <b>${nb}</b> cartons de <b>${carton}</b> unités chacun. Après avoir vendu <b>${c}</b> unités ce jour-là, combien reste-t-il en stock (à partir de ce réassort) ?`, (nb*carton)-c, 'unités', 0.5);
}

function genReappro(diff){
  if(diff==='facile'){ const a=rnd(15,40); const b=rnd(5,a);
    return q(`Stock de sécurité : <b>${a}</b> unités. Stock actuel : <b>${b}</b>. Combien réapprovisionner pour revenir à 2 fois le stock de sécurité ?`, (2*a)-b, 'unités', 0.5); }
  if(diff==='moyen'){ const smax=rnd(80,150), stockActuel=rnd(5,79);
    return q(`Stock maximum souhaité : <b>${smax}</b>, stock actuel : <b>${stockActuel}</b>. Quelle quantité commander pour atteindre le stock maximum ?`, smax-stockActuel, 'unités', 0.5); }
  const conso=rnd(5,20); const delai=rnd(3,10);
  return q(`Consommation moyenne journalière : <b>${conso}</b> unités. Délai de livraison fournisseur : <b>${delai}</b> jours. Quel est le stock d'alerte (seuil de commande) ?`, conso*delai, 'unités', 0.5);
}

function genRupture(diff){
  if(diff==='facile'){ const conso=rnd(8,25); const stock=rnd(60,200);
    return q(`Consommation moyenne journalière : <b>${conso}</b> unités. Stock actuel : <b>${stock}</b> unités. Dans combien de jours le stock sera-t-il épuisé (arrondi à l'entier) ?`, Math.round(stock/conso), 'jours', 0.5); }
  if(diff==='moyen'){ const casesTot=rnd(200,500), casesVendues=rnd(50,199);
    return q(`Le stock initial de la période était de <b>${casesTot}</b> unités, il en reste <b>${casesTot-casesVendues}</b>. Quel est le taux d'écoulement du stock (%, arrondi à 1 décimale) ?`, round2(100*casesVendues/casesTot), '%', 0.5); }
  const caAnnuel=rnd(20000,80000); const stockMoyen=rnd(2000,8000);
  return q(`CA annuel réalisé sur cette famille de produits : <b>${caAnnuel} €</b>. Stock moyen valorisé : <b>${stockMoyen} €</b>. Quel est le coefficient de rotation des stocks (arrondi à 1 décimale) ?`, round2(caAnnuel/stockMoyen), 'fois/an', 0.2);
}

function q(text, answer, unit, tol){ return {type:'num', q:text, answer, unit, tol}; }

  ],

function shuffle_(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
const qcmQueues = {};
function nextQcmIndex_(theme){
  if(!qcmQueues[theme] || qcmQueues[theme].length===0){
    qcmQueues[theme] = shuffle_([...Array(QCM_BANKS[theme].length).keys()]);
  }
  return qcmQueues[theme].pop();
}
function genQcm(theme){
  const bank = QCM_BANKS[theme];
  const item = bank[nextQcmIndex_(theme)];
  const order = shuffle_(item.choices.map((c,i)=>i));
  const choices = order.map(i=>item.choices[i]);
  const answer = order.indexOf(item.correct);
  return {type:'qcm', q:item.q, choices, answer};
}

const CALC_GEN = { ht_ttc:genHtTtc, remise:genRemise, taux_evolution:genTauxEvolution, marge_marque:genMargeMarque, coefficient:genCoefficient, stock_final:genStockFinal, reappro:genReappro, rupture:genRupture };

function generateExercise(theme, diff){
  let base;
  if(CALC_GEN[theme]){ base = CALC_GEN[theme](diff); base.diff = diff; }
  else base = genQcm(theme);
  base.theme = theme;
  return base;
}

function pickDifficulty(records, student, classe, theme){
  const mine = records.filter(r=>r.student===student && r.classe===classe && r.theme===theme).slice(-4);
  if(mine.length===0) return 'moyen';
  const pct = 100*mine.filter(r=>r.correct).length/mine.length;
  if(pct<40) return 'facile';
  if(pct<75) return 'moyen';
  return 'difficile';
}
const LEVELS = [
  {key:'non_traite', label:'Non travaillé', hex:'#9a988e'},
  {key:'non_acquis', label:'Non acquis', hex:'#C1533B'},
  {key:'en_cours', label:"En cours d'acquisition", hex:'#C9973D'},
  {key:'acquis', label:'Acquis', hex:'#2E8B79'}
];
function levelForPct(pct){ if(pct<40) return LEVELS[1]; if(pct<70) return LEVELS[2]; return LEVELS[3]; }
function acquisitionLevelTheme(records, student, classe, theme){
  const mine = records.filter(r=>r.student===student && r.classe===classe && r.theme===theme);
  if(mine.length===0) return LEVELS[0];
  const recent = mine.slice(-6);
  return levelForPct(100*recent.filter(r=>r.correct).length/recent.length);
}
function acquisitionLevelDomain(records, student, classe, domainKey){
  const themesOfDomain = Object.keys(THEMES).filter(t=>THEMES[t].domain===domainKey);
  const mine = records.filter(r=>r.student===student && r.classe===classe && themesOfDomain.includes(r.theme));
  if(mine.length===0) return LEVELS[0];
  const recent = mine.slice(-6);
  return levelForPct(100*recent.filter(r=>r.correct).length/recent.length);
}
function dayKey(ts){ const d=new Date(ts); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function formatDate(ts){ const d=new Date(ts); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }
function todayKey(){ return dayKey(Date.now()); }
function sessionsByTheme(records, student, classe, theme){
  const mine = records.filter(r=>r.student===student && r.classe===classe && r.theme===theme);
  const byDay = {};
  mine.forEach(r=>{ const k=dayKey(r.ts); if(!byDay[k]) byDay[k]={ts:r.ts, ok:0, tot:0}; byDay[k].tot++; if(r.correct) byDay[k].ok++; });
  return Object.values(byDay).sort((a,b)=>a.ts-b.ts).map(s=>({...s, pct:100*s.ok/s.tot, level:levelForPct(100*s.ok/s.tot)}));
}
function todayResultsByStudent(records, classe){
  const tk = todayKey();
  const todays = records.filter(r=>dayKey(r.ts)===tk && r.classe===classe);
  const byStudent = {};
  todays.forEach(r=>{
    if(!byStudent[r.student]) byStudent[r.student] = {};
    if(!byStudent[r.student][r.theme]) byStudent[r.student][r.theme] = {ok:0, tot:0};
    byStudent[r.student][r.theme].tot++;
    if(r.correct) byStudent[r.student][r.theme].ok++;
  });
  return byStudent;
}

      <h2 style="font-size:18px;">Séance terminée !</h2>
      <p>${state.studentName}, tu as obtenu <b>${state.sessionCorrect}/${SESSION_LEN}</b> bonnes réponses.</p>
      ${state.sessionNote?`<p style="font-family:var(--font-mono);font-size:20px;">Note : ${note}/5</p>`:''}
      <p class="muted">Ton enseignante peut suivre ta progression dans le tableau de bord. À demain pour un nouveau rituel !</p>
    </div>`;
    return c;
  }

  if(!state.currentExercise){
    const diff = pickDifficulty(state.records, state.studentName, state.sessionClasse, state.sessionTheme);
    state.currentExercise = generateExercise(state.sessionTheme, diff);
    state.selectedChoice=null; state.numAnswer=''; state.answered=false; state.lastCorrect=null;
    startTimer_();
  }
  const ex = state.currentExercise;
  const receipt = document.createElement('div'); receipt.className='receipt';
  let inner = `<div class="progress">Question ${state.sessionIndex+1} / ${SESSION_LEN}${!state.answered?` · <span id="timer-display">⏱ ${state.timeLeft}s</span>`:''}</div>
    <div class="tag" style="background:${dom.hex}">${th.label}</div>`;
  if(ex.diff) inner += `<div class="tag outline" style="color:${dom.hex}">${ex.diff}</div>`;
  inner += `<div class="qtext">${ex.q}</div>`;
  if(ex.type==='qcm'){
    inner += `<div class="choices">${ex.choices.map((ch,i)=>`<div class="choice ${state.selectedChoice===i?'selected':''}" data-i="${i}">${ch}</div>`).join('')}</div>`;
  } else {
    inner += `<input type="number" step="0.01" id="num-input" placeholder="Ta réponse (${ex.unit})" value="${state.numAnswer}" />`;
  }
  if(!state.answered){
    inner += `<button class="btn" id="validate-btn">Valider</button>`;
  } else {
    inner += `<div class="feedback ${state.lastCorrect?'good':'bad'}">${state.lastCorrect?'✓ Bonne réponse !':(state.timedOut?'⏱ Temps écoulé — ':'✗ Pas tout à fait — ')+'révise ce point avec ta fiche référentiel.'}${ex.type==='num'?` (réponse attendue : ${ex.answer} ${ex.unit})`:''}</div>
    <button class="btn secondary" id="next-btn">${state.sessionIndex+1>=SESSION_LEN?'Voir mon résultat':'Question suivante'}</button>`;
  }
  receipt.innerHTML = inner;
  c.appendChild(receipt);
  return c;
}

function clearTimer_(){
  if(state.timerInterval){ clearInterval(state.timerInterval); state.timerInterval = null; }
}
function startTimer_(){
  clearTimer_();
  state.timeLeft = TIME_PER_QUESTION;
  state.timedOut = false;
  state.timerInterval = setInterval(()=>{
    state.timeLeft--;
    const el = document.getElementById('timer-display');
    if(el) el.textContent = `⏱ ${state.timeLeft}s`;
    if(state.timeLeft<=0){
      clearTimer_();
      handleTimeout_();
    }
  }, 1000);
}
async function handleTimeout_(){
  if(state.answered) return;
  const ex = state.currentExercise;
  state.answered = true;
  state.lastCorrect = false;
  state.timedOut = true;
  const rec = {student:state.studentName, classe:state.sessionClasse, theme:ex.theme, correct:false, ts:Date.now()};
  await saveRecord(rec);
  state.records.push(rec);
  render();
}

async function beginSession_(classe){
  state.sessionClasse = classe;
  await saveStudent(state.studentName, classe);
  state.records = await loadRecords();
  state.sessionIndex = 0; state.sessionCorrect = 0; state.sessionDone = false;
  render();
}

function attachEleveHandlers(){
  const startBtn = document.getElementById('start-btn');
  if(startBtn){
    startBtn.onclick = async ()=>{
      const val = document.getElementById('name-input').value.trim();
      if(!val) return;
      state.studentName = val;
      const rosters = await loadRosters();
      const norm = s => s.trim().toLowerCase();
      const matches = state.classNames.filter(cn => (rosters[cn]||[]).some(n => norm(n)===norm(val)));
      if(matches.length===1){
        await beginSession_(matches[0]);
      } else {
        render(); // classe inconnue ou ambiguë → l'écran de sélection de classe s'affichera
      }
    };
  }
  document.querySelectorAll('.choice').forEach(el=>{
    el.onclick = ()=>{ if(state.answered) return; state.selectedChoice = parseInt(el.dataset.i); render(); };
  });
  const numInput = document.getElementById('num-input');
  if(numInput) numInput.oninput = (e)=>{ state.numAnswer = e.target.value; };
  const validateBtn = document.getElementById('validate-btn');
  if(validateBtn){
    validateBtn.onclick = async ()=>{
      const ex = state.currentExercise;
      let correct=false;
      if(ex.type==='qcm'){ if(state.selectedChoice===null) return; correct = state.selectedChoice===ex.answer; }
      else { const v=parseFloat(state.numAnswer); if(isNaN(v)) return; correct = Math.abs(v-ex.answer)<=ex.tol; }
      clearTimer_();
      state.answered=true; state.lastCorrect=correct; state.timedOut=false;
      if(correct) state.sessionCorrect++;
      const rec = {student:state.studentName, classe:state.sessionClasse, theme:ex.theme, correct, ts:Date.now()};
      await saveRecord(rec);
      state.records.push(rec);
      render();
    };
  }
  const nextBtn = document.getElementById('next-btn');
  if(nextBtn){
    nextBtn.onclick = async ()=>{
      state.sessionIndex++;
      state.currentExercise = null;
      if(state.sessionIndex>=SESSION_LEN){
        state.sessionDone = true;
        if(state.sessionNote && !state.notesSaved){
          const note = Math.round((state.sessionCorrect/SESSION_LEN)*5*2)/2;
          await saveSessionNote({student:state.studentName, classe:state.sessionClasse, theme:state.sessionTheme, note, correct:state.sessionCorrect, total:SESSION_LEN, ts:Date.now()});
          state.notesSaved = true;
        }
      }
      render();
    };
  }
}

// ---------------- enseignant ----------------
async function renderEnseignant(){
  const el = document.getElementById('ens-container');
  if(!el) return;
  const records = await loadRecords();
  const students = await loadStudents();
  const classNames = await loadClassNames();
  const sessionNotes = await loadSessionNotes();
  const publicUrl = await loadPublicUrl();
  state.records = records; state.classNames = classNames; state.publicUrl = publicUrl;
  if(!state.selectedStudentKey && students.length) state.selectedStudentKey = students[0].name+'|'+students[0].classe;

  const picked = state.teacherPickedTheme;
  const url = (picked && state.publicUrl) ? `${state.publicUrl}?theme=${picked}${state.teacherNoteMode?'&note=1':''}` : null;

  // --- Lien public de cette page ---
  let html = `<h2 style="font-size:18px;">Lien public de cette page</h2>
    <p class="muted">Colle ici l'adresse de ta page (GitHub Pages). C'est nécessaire pour que les QR codes générés ci-dessous pointent au bon endroit — sans cette étape, les élèves ne pourront pas ouvrir le lien.</p>
    <input type="text" id="publicurl-input" placeholder="https://tonpseudo.github.io/ton-depot/" value="${publicUrl}" />
    <button class="btn secondary" id="publicurl-save" style="margin-top:8px;">Enregistrer ce lien</button>
    ${publicUrl?`<p class="muted" style="margin-top:8px;color:var(--teal);">✓ Lien enregistré.</p>`:`<p class="muted" style="margin-top:8px;color:var(--coral);">⚠ Aucun lien enregistré pour l'instant — les QR ne fonctionneront pas.</p>`}`;

  // --- Classes ---
  html += `<hr style="margin:26px 0;border:none;border-top:1px solid var(--paper-line);"><h2 style="font-size:18px;">Classes</h2>
    <p class="muted">Nomme tes deux classes de ce niveau (ex : 2A / 2B) pour pouvoir les comparer.</p>
    <div style="display:flex;gap:10px;">
      <input type="text" id="classname-0" value="${classNames[0]}" />
      <input type="text" id="classname-1" value="${classNames[1]}" />
    </div>`;

  // --- Élèves inscrits (reconnaissance automatique de la classe) ---
  const rosters = await loadRosters();
  html += `<hr style="margin:26px 0;border:none;border-top:1px solid var(--paper-line);"><h2 style="font-size:18px;">Élèves inscrits</h2>
    <p class="muted">Colle un prénom par ligne pour chaque classe. Dès qu'un élève saisit son prénom, sa classe est reconnue automatiquement — on ne lui demande plus. En cas de prénom en double ou non reconnu, l'outil lui demandera sa classe exceptionnellement.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div><label class="muted" style="font-size:12px;">${classNames[0]}</label>
        <textarea id="roster-0" rows="8" style="width:100%;font-family:var(--font-mono);font-size:13px;padding:8px;border:1.5px solid var(--ink);border-radius:3px;background:var(--paper);color:var(--ink);">${(rosters[classNames[0]]||[]).join('\n')}</textarea></div>
      <div><label class="muted" style="font-size:12px;">${classNames[1]}</label>
        <textarea id="roster-1" rows="8" style="width:100%;font-family:var(--font-mono);font-size:13px;padding:8px;border:1.5px solid var(--ink);border-radius:3px;background:var(--paper);color:var(--ink);">${(rosters[classNames[1]]||[]).join('\n')}</textarea></div>
    </div>
    <button class="btn secondary" id="roster-save" style="margin-top:8px;">Enregistrer les listes</button>`;

  // --- Séance du jour ---
  html += `<hr style="margin:26px 0;border:none;border-top:1px solid var(--paper-line);"><h2 style="font-size:18px;">Séance du jour</h2>
    <p class="muted">Choisis le thème du jour : un seul QR / lien à donner, valable pour les deux classes — la classe de chaque élève est reconnue automatiquement.</p>`;
  Object.entries(DOMAINS).forEach(([dk,dv])=>{
    html += `<div class="domgroup"><div class="domgroup-title" style="color:${dv.hex}">${dv.label}</div><div class="themepick">`;
    Object.entries(THEMES).filter(([,t])=>t.domain===dk).forEach(([tk,tv])=>{
      html += `<div class="themebtn ${picked===tk?'active':''}" data-k="${tk}" style="border-color:${dv.hex}; ${picked===tk?`background:${dv.hex}`:''}">${tv.label}</div>`;
    });
    html += `</div></div>`;
  });
  html += `<label style="display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;cursor:pointer;">
    <input type="checkbox" id="note-toggle" ${state.teacherNoteMode?'checked':''} style="width:16px;height:16px;" />
    Séance notée (génère une note /5 dans le tableau de bord)
  </label>`;
  if(picked && !state.publicUrl){
    html += `<p class="muted" style="color:var(--coral);margin-top:10px;">⚠ Renseigne d'abord le lien public de la page (en haut de ce panneau) pour générer le QR de la séance.</p>`;
  }
  if(picked && url){
    html += `<p class="muted">Lien de la séance${state.teacherNoteMode?' (notée)':''} :<br><span style="font-family:var(--font-mono);font-size:12px;">${url}</span></p>
    <div id="qr-box"></div>
    <p class="muted" style="margin-top:8px;">Si le QR ne s'affiche pas sur monlycee.net, le lien texte ci-dessus reste utilisable.</p>`;
  }

  // --- Résultats d'aujourd'hui (par classe) ---
  html += `<hr style="margin:26px 0;border:none;border-top:1px solid var(--paper-line);"><h2 style="font-size:18px;">Résultats d'aujourd'hui</h2>`;
  classNames.forEach(cn=>{
    const today = todayResultsByStudent(records, cn);
    const todayStudents = Object.keys(today);
    html += `<div class="domgroup-title" style="margin-top:10px;">${cn}</div>`;
    if(todayStudents.length===0){
      html += `<p class="muted">Aucun élève de ${cn} n'a encore fait le rituel aujourd'hui.</p>`;
    } else {
      html += `<table><thead><tr><th>Élève</th><th>Thème</th><th>Score</th><th>Niveau du jour</th></tr></thead><tbody>`;
      todayStudents.forEach(s=>{
        Object.entries(today[s]).forEach(([theme, v])=>{
          const th = THEMES[theme]; const dom = DOMAINS[th.domain];
          const lvl = levelForPct(100*v.ok/v.tot);
          html += `<tr><td><b>${s}</b></td><td><span style="color:${dom.hex};font-family:var(--font-mono);font-size:12px;">${th.label}</span></td><td>${v.ok}/${v.tot}</td><td><span class="lvl" style="background:${lvl.hex}">${lvl.label}</span></td></tr>`;
        });
      });
      html += `</tbody></table>`;
    }
  });

  // --- Notes (séances évaluées) ---
  html += `<hr style="margin:26px 0;border:none;border-top:1px solid var(--paper-line);"><h2 style="font-size:18px;">Notes — séances évaluées</h2>`;
  if(sessionNotes.length===0){
    html += `<p class="muted">Aucune séance notée pour le moment.</p>`;
  } else {
    classNames.forEach(cn=>{
      const notesForClass = sessionNotes.filter(n=>n.classe===cn).sort((a,b)=>b.ts-a.ts);
      html += `<div class="domgroup-title" style="margin-top:10px;">${cn}</div>`;
      if(notesForClass.length===0){
        html += `<p class="muted" style="font-size:12px;">Aucune note pour ${cn}.</p>`;
      } else {
        html += `<table><thead><tr><th>Date</th><th>Élève</th><th>Thème</th><th>Score</th><th>Note</th></tr></thead><tbody>`;
        notesForClass.forEach(n=>{
          const th = THEMES[n.theme]; const dom = DOMAINS[th.domain];
          html += `<tr><td>${formatDate(n.ts)}</td><td><b>${n.student}</b></td><td><span style="color:${dom.hex};font-family:var(--font-mono);font-size:12px;">${th.label}</span></td><td>${n.correct}/${n.total}</td><td><b>${n.note}/5</b></td></tr>`;
        });
        html += `</tbody></table>`;
      }
    });
  }

  // --- Progression par compétence ---
  html += `<hr style="margin:26px 0;border:none;border-top:1px solid var(--paper-line);"><h2 style="font-size:18px;">Progression par compétence</h2>`;
  if(students.length===0){
    html += `<p class="muted">Aucune donnée pour le moment.</p>`;
  } else {
    html += `<select id="student-select">${students.map(s=>{ const key=s.name+'|'+s.classe; return `<option value="${key}" ${state.selectedStudentKey===key?'selected':''}>${s.name} (${s.classe})</option>`; }).join('')}</select>`;
    const [selName, selClasse] = state.selectedStudentKey.split('|');
    Object.entries(DOMAINS).forEach(([dk,dv])=>{
      html += `<div class="domgroup-title" style="color:${dv.hex}; margin-top:16px;">${dv.label}</div>`;
      Object.entries(THEMES).filter(([,t])=>t.domain===dk).forEach(([tk,tv])=>{
        const sessions = sessionsByTheme(records, selName, selClasse, tk);
        html += `<div style="margin-top:8px;"><div style="font-family:var(--font-mono);font-size:12px;margin-bottom:4px;">${tv.label}</div>`;
        if(sessions.length===0){ html += `<p class="muted" style="font-size:12px;">Pas encore travaillé.</p>`; }
        else {
          html += `<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;">` + sessions.map(s=>
            `<div style="text-align:center;"><div class="lvl" style="background:${s.level.hex}">${s.level.label}</div><div class="muted" style="font-size:11px;margin-top:3px;">${formatDate(s.ts)}</div></div>`
          ).join('<span style="color:var(--paper-line);">→</span>') + `</div>`;
        }
        html += `</div>`;
      });
    });
  }

  // --- Vue globale : comparaison des 2 classes ---
  html += `<hr style="margin:26px 0;border:none;border-top:1px solid var(--paper-line);"><h2 style="font-size:18px;">Vue globale — comparaison des classes</h2>`;
  if(students.length===0){
    html += `<p class="muted">Aucun élève n'a encore participé.</p>`;
  } else {
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">`;
    classNames.forEach(cn=>{
      const classStudents = students.filter(s=>s.classe===cn);
      html += `<div><h3 style="font-size:15px;">${cn}</h3>`;
      if(classStudents.length===0){
        html += `<p class="muted" style="font-size:12px;">Aucun élève.</p>`;
      } else {
        Object.entries(DOMAINS).forEach(([dk,dv])=>{
          const counts = {non_traite:0, non_acquis:0, en_cours:0, acquis:0};
          classStudents.forEach(s=>{ counts[acquisitionLevelDomain(records,s.name,cn,dk).key]++; });
          const total = classStudents.length;
          html += `<div style="margin-bottom:8px;"><div style="font-family:var(--font-mono);font-size:11px;color:${dv.hex}">${dv.label}</div>
            <div class="sumbar">${LEVELS.map(l=>`<div style="width:${total?100*counts[l.key]/total:0}%;background:${l.hex}" title="${l.label}: ${counts[l.key]}"></div>`).join('')}</div></div>`;
        });
        html += `<table style="font-size:11.5px;"><thead><tr><th>Élève</th>${Object.values(DOMAINS).map(d=>`<th>${d.label.split(' ')[0]}</th>`).join('')}</tr></thead><tbody>`;
        classStudents.forEach(s=>{
          html += `<tr><td><b>${s.name}</b></td>`;
          Object.keys(DOMAINS).forEach(dk=>{
            const lvl = acquisitionLevelDomain(records,s.name,cn,dk);
            html += `<td><span class="lvl" style="background:${lvl.hex};padding:2px 6px;">${lvl.label.split(' ')[0]}</span></td>`;
          });
          html += `</tr>`;
        });
        html += `</tbody></table>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  el.innerHTML = html;

  document.querySelectorAll('.domgroup .themebtn').forEach(btn=>{
    btn.onclick = ()=>{ state.teacherPickedTheme = btn.dataset.k; renderEnseignant(); };
  });
  const noteToggle = document.getElementById('note-toggle');
  if(noteToggle) noteToggle.onchange = (e)=>{ state.teacherNoteMode = e.target.checked; renderEnseignant(); };
  const purlSave = document.getElementById('publicurl-save');
  if(purlSave) purlSave.onclick = async ()=>{
    const val = document.getElementById('publicurl-input').value.trim().replace(/\/$/,'');
    await savePublicUrl(val);
    state.publicUrl = val;
    renderEnseignant();
  };
  const sel = document.getElementById('student-select');
  if(sel) sel.onchange = (e)=>{ state.selectedStudentKey = e.target.value; renderEnseignant(); };
  const cn0 = document.getElementById('classname-0');
  const cn1 = document.getElementById('classname-1');
  if(cn0) cn0.onchange = async (e)=>{ const names=[e.target.value.trim()||'Classe A', classNames[1]]; await saveClassNames(names); renderEnseignant(); };
  if(cn1) cn1.onchange = async (e)=>{ const names=[classNames[0], e.target.value.trim()||'Classe B']; await saveClassNames(names); renderEnseignant(); };
  const rosterSave = document.getElementById('roster-save');
  if(rosterSave) rosterSave.onclick = async ()=>{
    const parseNames = txt => txt.split('\n').map(s=>s.trim()).filter(Boolean);
    const newRosters = { ...rosters,
      [classNames[0]]: parseNames(document.getElementById('roster-0').value),
      [classNames[1]]: parseNames(document.getElementById('roster-1').value)
    };
    await saveRosters(newRosters);
    renderEnseignant();
  };

  if(picked && url){
    const qrBox = document.getElementById('qr-box');
    if(qrBox && window.QRCode){ qrBox.innerHTML=''; new QRCode(qrBox, {text:url, width:160, height:160}); }
  }
}

(async function init(){ state.classNames = await loadClassNames(); state.publicUrl = await loadPublicUrl(); render(); if(isTeacher) renderEnseignant(); })();
</script>
